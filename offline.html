<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KarjoAgro - Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #17324f 0%, #09111d 55%, #04070d 100%);
      color: #e8f1ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(92vw, 520px);
      padding: 28px;
      border-radius: 20px;
      background: rgba(10, 18, 32, 0.88);
      border: 1px solid rgba(139, 174, 255, 0.18);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 1.5rem; }
    p { margin: 0; line-height: 1.6; color: #b9c9e6; }
    .small { margin-top: 14px; font-size: 0.9rem; color: #8ea1c7; }
  </style>
</head>
<body>
  <div class="card">
    <h1>KarjoAgro sedang offline</h1>
    <p>Halaman utama tetap tersimpan di perangkat. Saat koneksi kembali, dashboard akan bisa sinkron lagi seperti biasa.</p>
    <p class="small">Anda masih bisa membuka tampilan dasar aplikasi, tetapi data live membutuhkan koneksi ke backend.</p>
  </div>
</body>
</html>
